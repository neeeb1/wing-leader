<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="output.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
        integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
        crossorigin="anonymous"></script>
</head>

<body class="flex flex-col h-screen">
    <header class="flex flex-col gap-2 top-0 m-0 p-4 w-screen text-center bg-green-700">
        <h1 class="text-3xl font-bold text-white italic">Wing Leader</h1>
        <h3 class="text-1xl font-bold text-white">Who's top of the flock?</h3>
        <h3 class="text-amber-300 hover:text-amber-100 underline italic"><a href="index.html">Home</a></h3>
    </header>
    <div class="flex-1 flex justify-center overflow-auto bg-amber-200">
        <div id="leaderboard-wrapper"
            class="flex flex-col mt-4 shadow-lg rounded-xl outline outline-green-800 items-center min-h-3/4 h-fit w-xl bg-green-500">
            <div class="leaderboard-header flex flex-col">
                <p>Top of the flock</p>
                <label for="items">Items in list...</label>
                <div>
                    <select name="listLength" class="accent-white">
                        <option value="5">5</option>
                        <option value="10" selected="selected">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <button
                        class="rounded-md outline border-green-800 text-green-800 hover:border-transparent hover:bg-green-800 hover:text-white active:bg-green-900"
                        hx-trigger="click" hx-target="#leaderboard-list" hx-get="/api/leaderboard" hx-swap="innerHTML"
                        hx-include="[name='listLength']">Reload...</button>
                </div>
            </div>
            <div id="leaderboard-list" class="leaderboard-list" hx-trigger="load" hx-get="/api/leaderboard"
                hx-swap="innerHTML" hx-vals='{"listLength": "10"}'>
                <table class="table-auto">
                    <caption class="caption-bottom">
                        <p>Visit the <a href="leaderboard.html"
                        class="text-amber-300 text-sm hover:text-amber-100 underline italic">full leaderboard</a></p>
                    </caption>
                    <tr>
                        <th>Ranking<br> </th>
                        <th>Common Name<br> </th>
                        <th>ELO Score <a class="text-xs font-light text-amber-300 hover:text-amber-100 underline italic" href="https://en.wikipedia.org/wiki/Elo_rating_system">(What's this?)</a></th>
                    </tr>
                    <tr class="leaderboard-first">
                        <td>1.</td>
                        <td>defaulticus maximus</td>
                        <td>999999999</td>
                    </tr>
                    <tr class="leaderboard-second">
                        <td>2.</td>
                        <td>defaulticus medius</td>
                        <td>999999998</td>
                    </tr>
                    <tr class="leaderboard-third">
                        <td>3.</td>
                        <td>defaulticus minimus</td>
                        <td>999999997</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    <div class="footer inset-x-0 bottom-0 m-0 p-0 w-screen text-center bg-green-700">
        <p>Copyright Neeeb | 2025</p>
    </div>
</body>

</html>
