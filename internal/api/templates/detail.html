<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="output.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Birds</title>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"
        integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz"
        crossorigin="anonymous"></script>
</head>

<body>
    <!-- header -->
    <header class="flex flex-col gap-4 header relative top-0 m-0 p-4 max-w-screen text-center bg-green-700">
        <h1 class="text-3xl font-bold text-white italic">Wing Leader</h1>
        <h3 class="text-1xl font-bold text-white">Who's top of the flock?</h3>
    </header>

    <!-- profile -->
    <div id="profile-wrapper">
        <img src="{{.Image}}">
        <h1>{{.CommonName}}</h1>
        <h3>{{.ScientificName}}</h3>
        <p>{{.Family}}, {{.Order}}</p>
        <p>Conservation status: {{.Status}}</p>
        <p>Last Updated: {{.LastUpdated}}</p>
    </div>

    <!-- footer -->
    <div class="footer relative inset-x-0 bottom-0 m-0 p-4 w-screen text-center bg-green-700">
        <p>Copyright Neeeb | 2025</p>
    </div>
</body>
