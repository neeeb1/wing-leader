services:
  app:
    build:
      context: ..
      dockerfile: ./build/Dockerfile
    container_name: go-app
    environment:
      NUTHATCH_KEY: ${NUTHATCH_KEY}
      DB_URL: postgresql://${DB_USER}:${DB_PASS}@${DB_HOST}:5432/${DB_NAME}?sslmode=disable
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    networks:
      - go-app-network

  caddy:
    image: caddy
    container_name: go-app-caddy
    depends_on:
      - app
    ports:
      - 80:80
    volumes:
      - caddy-config:/config
      - caddy-data:/data
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - go-app-network

  postgres:
    image: postgres:17-bookworm
    restart: always
    container_name: go-app-db
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: [CMD-SHELL, "sh -c 'pg_isready -U ${DB_USER} -d ${DB_NAME}'"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - go-app-network

  migrations:
    image: ghcr.io/kukymbr/goose-docker:3.26.0
    restart: no
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: host=${DB_HOST} port=5432 user=${DB_USER} password=${DB_PASS} dbname=${DB_NAME}
    volumes:
      - ../sql/schema:/migrations
    networks:
      - go-app-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
      - --web.enable-lifecycle
    expose:
      - 9090
    ports:
      - 9090:9090
    networks:
      - go-app-network

volumes:
  pg-data:
  caddy-config:
  caddy-data:
  prometheus_data:

networks:
  go-app-network:
